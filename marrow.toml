core_dir = "/opt/marrow-core"

[[agents]]
name = "watchdog"
heartbeat_interval = 300  # check every 5 min — faster agents don't need sub-minute polling
heartbeat_timeout = 180  # LLM call + tools takes ≥2 min; 60s was always timing out
workspace = "/Users/marrow"
agent_command = "/Users/marrow/.opencode/bin/opencode run --agent watchdog"
context_dirs = [
  "/Users/marrow/context.d",
]

[[agents]]
name = "scout"
heartbeat_interval = 300
heartbeat_timeout = 500
workspace = "/Users/marrow"
agent_command = "/Users/marrow/.opencode/bin/opencode run --agent scout"
context_dirs = [
  "/Users/marrow/context.d",
]

[[agents]]
name = "artisan"
heartbeat_interval = 14400
heartbeat_timeout = 7200
workspace = "/Users/marrow"
agent_command = "/Users/marrow/.opencode/bin/opencode run --agent artisan"
context_dirs = [
  "/Users/marrow/context.d",
]

[[agents]]
name = "refit"
heartbeat_interval = 302400  # twice a week (3.5 days)
heartbeat_timeout = 28800  # 8 h — deep co-evolution sessions can run long
workspace = "/Users/marrow"
agent_command = "/Users/marrow/.opencode/bin/opencode run --agent refit"
context_dirs = [
  "/Users/marrow/context.d",
]
