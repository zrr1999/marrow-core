# roles.toml — agent-caster project configuration
# Maps abstract model tiers to concrete models and configures cast targets.
#
# Three model tiers, describing capability depth and cost profile:
#
#   deep      Highest capability; longest context; highest cost.
#             For sustained meta-reasoning and strategic synthesis.
#             Sessions span multiple hours to days (refit: twice a week).
#             → claude-opus-4.6 (maximum reasoning + creative synthesis)
#
#   standard  Balanced capability; multi-turn context; moderate cost.
#             For deep implementation work requiring sustained focus.
#             Sessions last minutes to hours (artisan: 4 h slots).
#             → claude-sonnet-4.6 (capable + cost-efficient for long sessions)
#
#   lite      Fast, low-cost, high call frequency.
#             For monitoring, dispatch, triage, and quick GitHub interactions.
#             Sessions last seconds (watchdog: 2 min, scout: 5 min, reviewer: 15 min).
#             → gpt-5-mini (low latency, cost-efficient, frequent calls)
#
# Tier-to-model mapping — edit here to swap models globally across all agents:
#   deep     = claude-opus-4.6   meta-learning; long-horizon reasoning (refit)
#   standard = claude-sonnet-4.6 execution workhorse; deep sessions (artisan)
#   lite     = gpt-5-mini        fast and cheap; monitoring + dispatch (scout/reviewer/watchdog)

[project]
agents_dir = "roles"

[targets.opencode]
output_dir = "."

[targets.opencode.model_map]
deep = "github-copilot/claude-opus-4.6"
standard = "github-copilot/claude-sonnet-4.6"
lite = "github-copilot/gpt-5-mini"
