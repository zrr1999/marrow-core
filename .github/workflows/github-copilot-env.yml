name: GitHub Copilot Environment

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  models: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  copilot-env:
    name: Copilot agent environment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync --group test

      - name: Install opencode
        run: npm install -g opencode-ai@1.2.20

      - name: Prepare GitHub Copilot test config
        run: |
          mkdir -p /tmp/marrow-copilot-ci/context.d
          cat > /tmp/marrow-copilot-ci.toml <<'EOF'
          core_dir = "${{ github.workspace }}"

          [[agents]]
          name = "scout"
          heartbeat_interval = 300
          heartbeat_timeout = 500
          workspace = "/tmp/marrow-copilot-ci"
          agent_command = "opencode run --agent scout"
          context_dirs = ["/tmp/marrow-copilot-ci/context.d"]
          EOF

      - name: Verify token wiring
        run: test -n "$GITHUB_TOKEN"

      - name: Check opencode availability
        run: opencode --version

      - name: marrow validate
        run: uv run marrow validate --config /tmp/marrow-copilot-ci.toml --verbose

      - name: marrow setup
        run: uv run marrow setup --config /tmp/marrow-copilot-ci.toml --verbose

      - name: marrow doctor
        run: uv run marrow doctor --config /tmp/marrow-copilot-ci.toml

      - name: marrow dry-run
        run: uv run marrow dry-run --config /tmp/marrow-copilot-ci.toml --verbose
