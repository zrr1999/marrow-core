# refit.toml — agent-caster project configuration
# Maps abstract model tiers to concrete models and configures cast targets.
#
# Three model tiers, aligned with the agent hierarchy and session horizon:
#
#   visionary  Long-horizon meta-reasoning and creative synthesis.
#              Sessions span days to weeks. Used by refit for strategic analysis
#              and systemic improvement proposals.
#              → claude-opus-4.6 (maximum reasoning + creativity)
#
#   craftsman  Sustained execution: code generation, research, and complex triage.
#              Sessions last minutes to hours. Used by artisan for deep implementation
#              work that requires full context retention.
#              → claude-sonnet-4.6 (balanced capability + cost)
#
#   sentinel   Reactive monitoring and fast dispatch.
#              Sessions last seconds. Used by watchdog, scout, and reviewer for
#              health checks, queue triage, and lightweight GitHub interactions.
#              → gpt-5-mini (low latency, cost-efficient, high call frequency)
#
# Tier-to-model mapping — edit here to swap models globally across all agents:
#   visionary = claude-opus-4.6   strongest reasoning; refit meta-learning
#   craftsman = claude-sonnet-4.6 execution workhorse; artisan deep sessions
#   sentinel  = gpt-5-mini        fast and cheap; watchdog / scout / reviewer

[project]
agents_dir = "roles"

[targets.opencode]
output_dir = "."

[targets.opencode.model_map]
visionary = "github-copilot/claude-opus-4.6"
craftsman = "github-copilot/claude-sonnet-4.6"
sentinel  = "github-copilot/gpt-5-mini"
