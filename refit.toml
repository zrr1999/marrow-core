# refit.toml — agent-caster project configuration
# Maps abstract model tiers to concrete models and configures cast targets.
#
# Model tiers (three levels):
#   daily     — day-level deep work; creative, analytical (artisan, refit)
#   minute    — minute-level fast work; strong code generation (scout, reviewer)
#   watchdog  — lightweight, high-frequency monitoring (watchdog)
#
# Current choices:
#   daily    = claude-opus-4.6  — best creativity and reasoning for long-horizon agents
#   minute   = gpt-5.4          — strong code generation; preferred for frequent loops
#   watchdog = gpt-5-mini       — efficient, low-cost model for rapid health checks

[project]
agents_dir = "roles"

[targets.opencode]
output_dir = "."

[targets.opencode.model_map]
daily = "github-copilot/claude-opus-4.6"
minute = "github-copilot/gpt-5.4"
watchdog = "github-copilot/gpt-5-mini"
